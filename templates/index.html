<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор таблицы</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-top: 30px; }
        form { margin-bottom: 20px; display: flex; gap: 10px; }
        input { padding: 5px; }
        table { border-collapse: collapse; width: 80%; max-width: 600px; text-align: center; }
        th, td { border: 1px solid #ddd; padding: 12px; }
        th { background-color: #f2f2f2; }
        button { padding: 5px 10px; cursor: pointer; }
        .delete-btn { background-color: #ff9999; color: white; border: none; }
    </style>
</head>
<body>

    <h1>Редактор таблицы</h1>

    <!-- Форма для добавления строки -->
    <form method="post" action="/add">
        <input type="text" name="col1" placeholder="Колонка 1" required>
        <input type="text" name="col2" placeholder="Колонка 2" required>
        <input type="text" name="col3" placeholder="Колонка 3" required>
        <button type="submit">Добавить строку</button>
    </form>

    <!-- Отображение таблицы -->
    <table>
        <tr>
            <th>Колонка 1</th>
            <th>Колонка 2</th>
            <th>Колонка 3</th>
            <th>Действие</th>
        </tr>
        {% for idx, row in enumerate(data) %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>
                <!-- Форма для удаления строки -->
                <form method="post" action="/delete/{{ idx }}">
                    <button class="delete-btn" type="submit">Удалить</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
